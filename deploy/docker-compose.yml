services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ssd
      POSTGRES_USER: ssd
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=ssd;Username=ssd;Password=change-me
    depends_on:
      - postgres
    ports:
      - "5184:8080"

volumes:
  postgres-data:
