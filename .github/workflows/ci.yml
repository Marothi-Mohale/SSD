name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SSD.sln -m:1

      - name: Build
        run: dotnet build SSD.sln --configuration Release --no-restore -m:1

      - name: Test
        run: dotnet test SSD.sln --configuration Release --no-build --verbosity normal -m:1
